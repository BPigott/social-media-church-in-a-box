# Authentication Configuration
[auth]
# Site URL is the base URL for your application
site_url = "http://localhost:5173"

# Additional redirect URLs that are allowed for email confirmations and password resets
# These URLs must be whitelisted for security
additional_redirect_urls = [
  "http://localhost:5173/reset-password",
  "http://127.0.0.1:5173/reset-password",
  "http://localhost:5173/onboarding",
  "http://127.0.0.1:5173/onboarding"
]

# Enable email-based authentication
[auth.email]
enable_signup = true

[functions.generate-style-guide]
verify_jwt = true

[functions.generate-social-posts]
verify_jwt = true

[functions.scrape-church-website]
verify_jwt = true

# Email Templates for Local Development
[auth.email.template.confirm_signup]
subject = "Welcome to ivangel - Confirm Your Email"
content_path = "./supabase/templates/confirm-signup.html"

[auth.email.template.reset_password]
subject = "Reset Your ivangel Password"
content_path = "./supabase/templates/reset-password.html"

[auth.email.template.change_email]
subject = "Confirm Your New Email Address - ivangel"
content_path = "./supabase/templates/change-email.html"
